model:
  name: AdaptiveHybridDecoder
  d_model: 240
  num_layers: 4
  confidence_threshold: 0.65

training:
  batch_size: 32
  epochs: 50
  learning_rate: 1e-4
  weight_decay: 1e-5
  grad_clip: 1.0

data:
  distance: 5
  rounds: 5
  error_rate: 0.005
  train_size: 100000
  val_size: 20000

noise:
  type: depolarizing
  # options: depolarizing, biased, coherent, spectator

paths:
  checkpoint_dir: results/checkpoints
  log_dir: results/logs
